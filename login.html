<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Bato School of Fisheries</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="Pictures/bsflogoo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-page">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <div class="admin-login-brand">
      <div class="logo-circle logo-circle-small">
        <img src="Pictures/bsflogoo.png" alt="BSF Logo" decoding="async">
      </div>
      <div>
        <p class="admin-login-label">Admin Portal</p>
        <h1>Bato School of Fisheries</h1>
      </div>
    </div>
    <p class="admin-login-desc">Sign in to manage homepage announcements.</p>
    <form id="login-form" class="admin-form">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" autocomplete="username" required placeholder="admin@example.com">

      <label for="login-password">Password</label>
      <div class="admin-password-field">
        <input id="login-password" type="password" autocomplete="current-password" required placeholder="Enter password">
        <button id="toggle-password-btn" type="button" class="admin-password-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
          <svg class="admin-password-icon admin-password-icon--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="admin-password-icon admin-password-icon--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
            <path d="M1 1l22 22"></path>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
          </svg>
        </button>
      </div>

      <p id="login-error" class="admin-error" hidden></p>
      <button id="login-submit-btn" type="submit" class="admin-btn admin-btn--primary admin-btn--full">Sign In</button>
    </form>
    <a href="index.html" class="admin-back-link">← Back to website</a>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
